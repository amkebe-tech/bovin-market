{% extends 'bovin_market/base.html' %}

{% block title %}Modifier {{ boeuf.nom }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-header">
                <h5 class="mb-0 text-white">✏️ Modifier {{ boeuf.nom }}</h5>
            </div>
            <div class="card-body p-4">

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Nom du bœuf</label>
                        <input type="text" name="nom" class="form-control"
                               value="{{ form.nom.value }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Race</label>
                        <select name="race" class="form-select">
                            <option value="zebu" {% if form.race.value == 'zebu' %}selected{% endif %}>Zébu</option>
                            <option value="gobra" {% if form.race.value == 'gobra' %}selected{% endif %}>Gobra</option>
                            <option value="djakoré" {% if form.race.value == 'djakoré' %}selected{% endif %}>Djakoré</option>
                            <option value="ndama" {% if form.race.value == 'ndama' %}selected{% endif %}>N'Dama</option>
                            <option value="metis" {% if form.race.value == 'metis' %}selected{% endif %}>Métis</option>
                            <option value="autre" {% if form.race.value == 'autre' %}selected{% endif %}>Autre</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3">{{ form.description.value }}</textarea>
                    </div>


                    <!-- Photo actuelle -->
                    {% if boeuf.photo %}
                        <div class="mb-3">
                            <label class="form-label">Photo actuelle</label>
                            <div>
                                <img src="{{ boeuf.photo.url }}"
                                     style="height:150px; object-fit:cover; border-radius:8px;">
                            </div>
                        </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Nouvelle photo</label>
                        <input type="file" name="photo" class="form-control" accept="image/*">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Poids total (kg)</label>
                            <input type="number" step="0.1" name="poids_total"
                                   class="form-control"
                                   value="{{ form.poids_total.value }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Date d'abattage</label>
                            <input type="date" name="date_abattage"
                                   class="form-control"
                                   value="{{ form.date_abattage.value }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Type de vente</label>
                        <select name="type_vente" class="form-select" id="type_vente">
                            <option value="kg" {% if form.type_vente.value == 'kg' %}selected{% endif %}>Par Kilogramme</option>
                            <option value="lot" {% if form.type_vente.value == 'lot' %}selected{% endif %}>Par Lot</option>
                        </select>
                    </div>

                    <div id="section_kg" {% if form.type_vente.value == 'lot' %}style="display:none"{% endif %}>
                        <div class="mb-3">
                            <label class="form-label">Prix par kg (FCFA)</label>
                            <input type="number" step="0.01" name="prix_par_kg"
                                   class="form-control"
                                   value="{{ form.prix_par_kg.value }}">
                        </div>
                    </div>

                    <div id="section_lot" {% if form.type_vente.value == 'kg' %}style="display:none"{% endif %}>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Poids d'un lot (kg)</label>
                                <input type="number" step="0.1" name="poids_lot"
                                       class="form-control"
                                       value="{{ form.poids_lot.value }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Nombre de lots</label>
                                <input type="number" name="nombre_lots"
                                       class="form-control"
                                       value="{{ form.nombre_lots.value }}">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Prix par lot (FCFA)</label>
                                <input type="number" step="0.01" name="prix_par_lot"
                                       class="form-control"
                                       value="{{ form.prix_par_lot.value }}">
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Statut</label>
                        <select name="statut" class="form-select">
                            <option value="disponible" {% if form.statut.value == 'disponible' %}selected{% endif %}>Disponible</option>
                            <option value="complet" {% if form.statut.value == 'complet' %}selected{% endif %}>Complet</option>
                            <option value="abattu" {% if form.statut.value == 'abattu' %}selected{% endif %}>Abattu</option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{% url 'detail_boeuf' boeuf.id %}"
                           class="btn btn-outline-gold w-50">
                            ← Annuler
                        </a>
                        <button type="submit" class="btn btn-gold w-50">
                             Sauvegarder
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script>
    const select = document.getElementById('type_vente');
    const sectionKg = document.getElementById('section_kg');
    const sectionLot = document.getElementById('section_lot');

    function updateSections() {
        if (select.value === 'kg') {
            sectionKg.style.display = 'block';
            sectionLot.style.display = 'none';
        } else {
            sectionKg.style.display = 'none';
            sectionLot.style.display = 'block';
        }
    }

    select.addEventListener('change', updateSections);
</script>
{% endblock %}
